name: Build & Publish APK Release

on:
  push:
    branches:
      - main # 💡 CHANGED: Triggers automatically on every push to your main branch. Change to 'master' if needed.

# Explicit permission needed to upload files to GitHub Releases
permissions:
  contents: write

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: App
        run: flutter pub get

      # 💡 NEW: Decode the Base64 Keystore string back into a physical .jks file
      # We place it directly in App/android/app/ so build.gradle.kts can find it
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > App/android/app/upload-keystore.jks

      # 💡 UPDATED: Pass the GitHub Secrets securely as environment variables
      - name: Build APK
        working-directory: App
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release --no-tree-shake-icons

      # 💡 NEW: Extract the version from your Flutter pubspec.yaml
      - name: Extract App Version
        id: extract_version
        run: |
          # Look inside the 'App' directory for pubspec.yaml
          # Find the line starting with 'version: ' and strip the prefix
          VERSION=$(grep '^version: ' App/pubspec.yaml | sed 's/version: //')
          # Save it as an output variable for the next step
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically generates a unique tag/name based on the workflow run number
          tag_name: build-${{ github.run_number }}
          
          # 💡 UPDATED: Inject the version into the release name
          name: Auto-Release Build ${{ github.run_number }} (v${{ steps.extract_version.outputs.APP_VERSION }})
          
          # 💡 NEW: Inject the version into the release body (this shows up in the JSON 'body' field)
          body: |
            🚀 **Automatic App Release**
            - **App Version:** `${{ steps.extract_version.outputs.APP_VERSION }}`
            - **GitHub Build Number:** `${{ github.run_number }}`
          
          # Looks inside the 'App' folder for the final output
          files: App/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}