name: Build & Publish APK Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically whenever you push a tag starting with 'v'

# 💡 NEW: Explicit permission needed to upload files to GitHub Releases
permissions:
  contents: write

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        # 💡 NEW: Tells the server to go into the 'App' folder first
        working-directory: App
        run: flutter pub get

      - name: Build APK
        # 💡 NEW: Tells the server to build from inside the 'App' folder
        working-directory: App
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 💡 NEW: Updated the path to look inside the 'App' folder for the final output
          files: App/build/app/outputs/flutter-apk/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
