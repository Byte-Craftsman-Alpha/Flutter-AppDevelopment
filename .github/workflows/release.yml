name: Build & Publish APK Release

on:
  push:
    branches:
      - feature # 💡 CHANGED: Triggers automatically on every push to your main branch. Change to 'master' if needed.

# Explicit permission needed to upload files to GitHub Releases
permissions:
  contents: write

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: App
        run: flutter pub get

      - name: Build APK
        working-directory: App
        run: flutter build apk --release --no-tree-shake-icons

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 💡 NEW: Automatically generates a unique tag/name based on the workflow run number
          tag_name: build-${{ github.run_number }}
          name: Auto-Release Build ${{ github.run_number }}
          
          # Looks inside the 'App' folder for the final output
          files: App/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
