name: Build & Publish APK Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # Required for google-github-actions/auth

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: App
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > App/android/app/upload-keystore.jks

      - name: Extract Version from Tag
        id: extract_version
        run: |
          CLEAN_VERSION=${GITHUB_REF_NAME#v}
          echo "APP_VERSION=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        working-directory: App
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk --release --no-tree-shake-icons \
          --build-name=${{ steps.extract_version.outputs.APP_VERSION }} \
          --build-number=${{ github.run_number }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 **Automatic App Release**
            - **App Version:** `${{ steps.extract_version.outputs.APP_VERSION }}`
            - **Build Number:** `${{ github.run_number }}`
          files: App/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'

      - name: Send FCM Notification
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          PAYLOAD=$(cat <<EOF
          {
            "message": {
              "topic": "general",
              "notification": {
                "title": "New Update Available!",
                "body": "Version ${{ steps.extract_version.outputs.APP_VERSION }} is out now. Update the app to latest version."
              },
              "data": {
                "version": "${{ steps.extract_version.outputs.APP_VERSION }}",
                "build": "${{ github.run_number }}",
                "type": "update_notification"
              }
            }
          }
          EOF
          )
          curl -X POST -H "Authorization: Bearer $ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "https://fcm.googleapis.com/v1/projects/edu-portal-d0a62/messages:send"