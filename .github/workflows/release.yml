name: Build & Publish APK Release

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v2.1.3, etc.

permissions:
  contents: write

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: App
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > App/android/app/upload-keystore.jks

      # 💡 NEW: Extract the version from your Git Tag instead of pubspec.yaml
      - name: Extract Version from Tag
        id: extract_version
        run: |
          # ${GITHUB_REF_NAME#v} removes the 'v' from 'v1.0.5', leaving '1.0.5'
          CLEAN_VERSION=${GITHUB_REF_NAME#v}
          echo "APP_VERSION=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      # 💡 UPDATED: Pass the dynamic version and automated run number to Flutter
      - name: Build APK
        working-directory: App
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk --release --no-tree-shake-icons \
          --build-name=${{ steps.extract_version.outputs.APP_VERSION }} \
          --build-number=${{ github.run_number }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 **Automatic App Release**
            - **App Version:** `${{ steps.extract_version.outputs.APP_VERSION }}`
            - **Build Number:** `${{ github.run_number }}`
          files: App/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}